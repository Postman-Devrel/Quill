# yaml-language-server: $schema=https://astropods.com/schema/package.json
spec: blueprint/v1
name: "@postman/quill"

meta:
  visibility: public

agent:
  build: { context: ., dockerfile: Dockerfile }
  interfaces:
    messaging: true
  inputs:
    - name: TAVILY_API_KEY
      datatype: string
      secret: true
      description: Tavily Search API key for blog topic research
    - name: WP_USERNAME
      datatype: string
      secret: true
      description: WordPress username for blog.postman.com
    - name: WP_APP_PASSWORD
      datatype: string
      secret: true
      description: WordPress application password (generate at blog.postman.com/wp-admin/profile.php under Application Passwords)
    - name: CONFLUENCE_EMAIL
      datatype: string
      secret: false
      description: Email of the Quill service-account user (e.g. quill@postman.com). Pages will be owned by this identity in Confluence — do not use a personal email.
    - name: CONFLUENCE_API_TOKEN
      datatype: string
      secret: true
      description: API token for the service account. Generate at id.atlassian.com while signed in AS the service account (not your personal account).

# Postman DevRel-specific constants live in code as defaults:
#   - Confluence destination:  space "Quill", parent page 8244560849
#     (see agent/lib/confluence.ts)
#   - Jira header tickets:     project MKTG, issue type Task,
#                              Marketing Team "Creative", base URL
#                              derived from CONFLUENCE_BASE_URL
#     (see agent/lib/jira.ts)
# These are intentionally NOT exposed as inputs — the deployed agent
# should work with just the credential inputs above. Change the defaults
# in code + redeploy if they need to move.

models:
  anthropic:
    provider: anthropic

dev:
  interfaces:
    messaging:
      adapters: [web]
  command: bun --watch run agent/index.ts
