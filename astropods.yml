# yaml-language-server: $schema=https://astropods.com/schema/package.json
spec: package/v1
name: "@postman/quill"

agent:
  build: { context: ., dockerfile: Dockerfile }
  interfaces:
    messaging: true
  inputs:
    - name: TAVILY_API_KEY
      datatype: string
      secret: true
      description: Tavily Search API key for blog topic research
    - name: WP_USERNAME
      datatype: string
      secret: true
      description: WordPress username for blog.postman.com
    - name: WP_APP_PASSWORD
      datatype: string
      secret: true
      description: WordPress application password (generate at blog.postman.com/wp-admin/profile.php under Application Passwords)
    - name: CONFLUENCE_EMAIL
      datatype: string
      secret: false
      description: Email of the Quill service-account user (e.g. quill@postman.com). Pages will be owned by this identity in Confluence — do not use a personal email.
    - name: CONFLUENCE_API_TOKEN
      datatype: string
      secret: true
      description: API token for the service account. Generate at id.atlassian.com while signed in AS the service account (not your personal account).
    - name: CONFLUENCE_SPACE_KEY
      datatype: string
      secret: false
      description: Key of the shared Confluence space where Quill saves ALL blog drafts (e.g. QUILL, BLOG-DRAFTS). Find it in any page URL under /wiki/spaces/{KEY}/pages/...
    - name: CONFLUENCE_PARENT_PAGE_ID
      datatype: string
      secret: false
      description: Optional. Numeric ID of a parent page under which to nest all drafts. Leave blank to save at the space root.

# Jira header-ticket settings (project=MKTG, issue type=Task, Marketing
# Team=Creative, base URL derived from CONFLUENCE_BASE_URL) live in
# agent/lib/jira.ts as code-side defaults. They are intentionally NOT
# exposed as inputs — users of the deployed agent shouldn't have to set
# them. Change the defaults in code + redeploy if they need to move.

models:
  anthropic:
    provider: anthropic

dev:
  interfaces:
    messaging:
      adapters: [web]
  command: bun --watch run agent/index.ts
