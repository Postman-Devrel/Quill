# yaml-language-server: $schema=https://astropods.com/schema/package.json
spec: package/v1
name: "@postman/quill"

agent:
  build: { context: ., dockerfile: Dockerfile }
  interfaces:
    messaging: true
  inputs:
    - name: TAVILY_API_KEY
      datatype: string
      secret: true
      description: Tavily Search API key for blog topic research
    - name: WP_USERNAME
      datatype: string
      secret: true
      description: WordPress username for blog.postman.com
    - name: WP_APP_PASSWORD
      datatype: string
      secret: true
      description: WordPress application password (generate at blog.postman.com/wp-admin/profile.php under Application Passwords)
    - name: CONFLUENCE_EMAIL
      datatype: string
      secret: false
      description: Email of the Quill service-account user (e.g. quill@postman.com). Pages will be owned by this identity in Confluence — do not use a personal email.
    - name: CONFLUENCE_API_TOKEN
      datatype: string
      secret: true
      description: API token for the service account. Generate at id.atlassian.com while signed in AS the service account (not your personal account).
    - name: CONFLUENCE_SPACE_KEY
      datatype: string
      secret: false
      description: Key of the shared Confluence space where Quill saves ALL blog drafts (e.g. QUILL, BLOG-DRAFTS). Find it in any page URL under /wiki/spaces/{KEY}/pages/...
    - name: CONFLUENCE_PARENT_PAGE_ID
      datatype: string
      secret: false
      description: Optional. Numeric ID of a parent page under which to nest all drafts. Leave blank to save at the space root.
    - name: JIRA_PROJECT_KEY
      datatype: string
      secret: false
      description: Optional. Jira project key for header-image tickets. Defaults to "MKTG".
    - name: JIRA_HEADER_ISSUE_TYPE
      datatype: string
      secret: false
      description: Optional. Jira issue type for header-image tickets. Defaults to "Task".
    - name: JIRA_MARKETING_TEAM
      datatype: string
      secret: false
      description: Optional. Value for the required "Marketing Team" field on MKTG tickets (customfield_13620). Defaults to "Creative".
    - name: JIRA_BASE_URL
      datatype: string
      secret: false
      description: Optional. Base URL for Jira. Derived from CONFLUENCE_BASE_URL by stripping "/wiki" if unset. Override only if Jira lives at a different host.
    - name: JIRA_HEADER_ASSIGNEE_ACCOUNT_ID
      datatype: string
      secret: false
      description: Optional. Atlassian accountId to auto-assign header tickets to (e.g. a specific designer). Leave blank to leave unassigned.

models:
  anthropic:
    provider: anthropic

dev:
  interfaces:
    messaging:
      adapters: [web]
  command: bun --watch run agent/index.ts
