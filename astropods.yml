# yaml-language-server: $schema=https://astropods.com/schema/package.json
spec: package/v1
name: "@postman/quill"

agent:
  build: { context: ., dockerfile: Dockerfile }
  interfaces:
    messaging: true
  inputs:
    - name: TAVILY_API_KEY
      datatype: string
      secret: true
      description: Tavily Search API key for blog topic research
    - name: WP_USERNAME
      datatype: string
      secret: true
      description: WordPress username for blog.postman.com
    - name: WP_APP_PASSWORD
      datatype: string
      secret: true
      description: WordPress application password (generate at blog.postman.com/wp-admin/profile.php under Application Passwords)
    - name: CONFLUENCE_API_TOKEN
      datatype: string
      secret: true
      description: Confluence API token (generate at id.atlassian.com → Security → Create and manage API tokens). Other Confluence config (base URL, email, space, parent page) is set as defaults in agent/lib/confluence.ts.

models:
  anthropic:
    provider: anthropic

dev:
  interfaces:
    messaging:
      adapters: [web]
  command: bun --watch run agent/index.ts
